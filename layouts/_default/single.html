{{ define "main" }}
<div class="page">
<a href="/" class="back">← Home</a>
<h1>{{ .Title }}</h1>
<p class="muted">{{ .Date.Format "2006-01-02" }}{{ if .Params.tags }} · {{ range $i, $t := .GetTerms "tags" }}{{ if $i }}, {{ end }}<a href="{{ $t.RelPermalink }}" class="tag-link">{{ $t.Title }}</a>{{ end }}{{ end }}</p>
<div class="content">{{ .Content }}</div>
</div>
{{ if .Params.math }}
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/contrib/auto-render.min.js"></script>
<script defer>window.addEventListener("load", function() { renderMathInElement(document.body); });</script>
{{ end }}
{{ if .Params.mermaid }}
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/mermaid/10.9.1/mermaid.min.js"></script>
<script defer>window.addEventListener("load", function() { mermaid.initialize({ startOnLoad: true }); });</script>
{{ end }}
{{ end }}
